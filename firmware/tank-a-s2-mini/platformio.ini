[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; These flags are the secret sauce for S2 Mini on Windows
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=0
    -D ARDUINO_USB_DFU_ON_BOOT=0

; Adjust this to your specific Windows COM port if known, 
; or leave it commented out for auto-detect
upload_port = COM6
monitor_port = COM7

lib_deps =
    knolleary/PubSubClient@^2.8