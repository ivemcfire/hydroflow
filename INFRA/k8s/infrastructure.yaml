# =============================================================================
# HydroFlow IoT Platform - Core Infrastructure Manifests
# Apply with: kubectl apply -f hydroflow-infrastructure.yaml
#
# Targets: Worker nodes only (one61, one62, one6t — OnePlus phones, ARM64)
# Storage: local-path provisioner (default on this k3s cluster)
# LoadBalancer: MetalLB pool 192.168.100.200-220
# MQTT Broker fixed IP: 192.168.100.207 (point your ESP32 sensors here)
# =============================================================================


# =============================================================================
# NAMESPACE
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: hydroflow
  labels:
    app.kubernetes.io/part-of: hydroflow


# =============================================================================
# PART 1: MQTT BROKER — Eclipse Mosquitto
# =============================================================================
---
# -- 1a. PVC: Mosquitto persistent storage for data & logs --
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-pvc
  namespace: hydroflow
  labels:
    app: mosquitto
    app.kubernetes.io/part-of: hydroflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
# -- 1b. ConfigMap: mosquitto.conf --
# Anonymous connections allowed so ESP32 sensors need no credentials.
# To add auth later: set allow_anonymous false and add a password_file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: hydroflow
  labels:
    app: mosquitto
    app.kubernetes.io/part-of: hydroflow
data:
  mosquitto.conf: |
    # Network
    listener 1883
    protocol mqtt

    # Security — open for ESP32 sensors on local LAN
    # Change to false and configure password_file for production hardening
    allow_anonymous true

    # Persistence — survives pod restarts
    persistence true
    persistence_location /mosquitto/data/

    # Logging
    log_dest file /mosquitto/log/mosquitto.log
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information

    # Connection tuning
    max_keepalive 120
    max_connections 500

---
# -- 1c. Deployment: Mosquitto MQTT Broker --
# Pinned to phone workers via nodeAffinity (excludes k3master control-plane).
# Single replica — Mosquitto doesn't support active-active clustering natively.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: hydroflow
  labels:
    app: mosquitto
    app.kubernetes.io/part-of: hydroflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  strategy:
    type: Recreate   # Required for ReadWriteOnce PVC — avoid two pods claiming same volume
  template:
    metadata:
      labels:
        app: mosquitto
        app.kubernetes.io/part-of: hydroflow
    spec:
      # -- Schedule only on phone worker nodes --
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        # Prefer spreading across different phones if rescheduled
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mosquitto
                topologyKey: kubernetes.io/hostname

      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0.21   # Pinned — avoid surprise breaking changes from :latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
            - name: log
              mountPath: /mosquitto/log
          # Verify broker is accepting connections before marking Ready
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-pvc
        - name: log
          emptyDir: {}   # Logs don't need persistence; stdout captures them for Loki

---
# -- 1d. Service: Mosquitto LoadBalancer --
# Fixed IP via MetalLB annotation — point all ESP32 sensors to 192.168.100.207:1883
# This IP is stable across pod restarts and rescheduling.
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: hydroflow
  labels:
    app: mosquitto
    app.kubernetes.io/part-of: hydroflow
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.100.207"
spec:
  type: LoadBalancer
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
      protocol: TCP
  # Cluster mode required: MetalLB L2 speaker is on k3master but pod runs on a
  # phone worker — Local mode would silently drop all external connections.
  externalTrafficPolicy: Cluster


# =============================================================================
# PART 2: DATABASE — PostgreSQL 15
# =============================================================================
---
# -- 2a. PVC: PostgreSQL persistent storage --
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: hydroflow
  labels:
    app: postgres
    app.kubernetes.io/part-of: hydroflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
# -- 2b. Secret: PostgreSQL credentials --
# NOT stored in this file — apply manually before deploying:
#
#   kubectl create secret generic postgres-secret \
#     --namespace hydroflow \
#     --from-literal=POSTGRES_DB=hydroflow \
#     --from-literal=POSTGRES_USER=hydroflow_user \
#     --from-literal=POSTGRES_PASSWORD='<your-strong-password>'
#
# See README.md § "Secrets Reference" for full details.
# Consider Sealed Secrets or k3s secret encryption at rest for production.

---
# -- 2c. Deployment: PostgreSQL 15 --
# ClusterIP only — the backend service is the sole consumer.
# Single replica — for HA consider CloudNativePG operator instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: hydroflow
  labels:
    app: postgres
    app.kubernetes.io/part-of: hydroflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate   # Required — PostgreSQL cannot run two instances against the same data dir
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: hydroflow
    spec:
      # -- Schedule only on phone worker nodes --
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        # Keep Postgres and Mosquitto on different phones when possible
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mosquitto
                topologyKey: kubernetes.io/hostname

      containers:
        - name: postgres
          image: postgres:15-alpine   # Alpine variant — smaller image, suits ARM64 phones
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata   # subPath prevents permission issues with local-path provisioner
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hydroflow_user
                - -d
                - hydroflow
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hydroflow_user
                - -d
                - hydroflow
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# -- 2d. Service: PostgreSQL ClusterIP --
# Internal only — reachable at postgres.hydroflow.svc.cluster.local:5432
# Use this hostname in your backend's DB connection string.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hydroflow
  labels:
    app: postgres
    app.kubernetes.io/part-of: hydroflow
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
