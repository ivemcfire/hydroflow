# =============================================================================
# HydroFlow Frontend — Kubernetes Manifest
# Namespace: hydroflow
# Registry:  192.168.100.206 (Gitea container registry, self-hosted)
# External:  192.168.100.208 (MetalLB — next free IP after Mosquitto .207)
# Apply:     kubectl apply -f frontend.yaml
# =============================================================================


# =============================================================================
# LoadBalancer Service — exposes dashboard on LAN
# Fixed IP via MetalLB: 192.168.100.208
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hydroflow-frontend
  namespace: hydroflow
  labels:
    app: hydroflow-frontend
    app.kubernetes.io/part-of: hydroflow
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.100.208"
spec:
  type: LoadBalancer
  selector:
    app: hydroflow-frontend
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP
  externalTrafficPolicy: Cluster


---
# =============================================================================
# Deployment — 1 replica, phone workers only, ARM64
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydroflow-frontend
  namespace: hydroflow
  labels:
    app: hydroflow-frontend
    app.kubernetes.io/part-of: hydroflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydroflow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hydroflow-frontend
        app.kubernetes.io/part-of: hydroflow
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        # Spread away from backend pod
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hydroflow-backend
                topologyKey: kubernetes.io/hostname

      imagePullSecrets:
        - name: gitea-registry

      containers:
        - name: hydroflow-frontend
          image: 192.168.100.206/ivemcfire/hydroflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP

          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: "production"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5

          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]

      terminationGracePeriodSeconds: 30
