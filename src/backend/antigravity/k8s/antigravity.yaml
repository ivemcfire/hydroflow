# =============================================================================
# HydroFlow Antigravity — Fastify IoT Backend
# Namespace:  hydroflow
# Registry:   192.168.100.206 (Gitea, HTTP — insecure registry)
# Apply:      kubectl apply -f antigravity.yaml
# =============================================================================


# =============================================================================
# Service — ClusterIP
# DNS: hydroflow-antigravity.hydroflow.svc.cluster.local:3001
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hydroflow-antigravity
  namespace: hydroflow
  labels:
    app: hydroflow-antigravity
    app.kubernetes.io/part-of: hydroflow
spec:
  type: ClusterIP
  selector:
    app: hydroflow-antigravity
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP


---
# =============================================================================
# Deployment — 1 replica, one61 preferred (most free worker)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydroflow-antigravity
  namespace: hydroflow
  labels:
    app: hydroflow-antigravity
    app.kubernetes.io/part-of: hydroflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydroflow-antigravity
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hydroflow-antigravity
        app.kubernetes.io/part-of: hydroflow
    spec:
      # -----------------------------------------------------------------------
      # Phone workers only — exclude k3master control plane
      # Prefer one61 (lightest loaded), avoid one62 (postgres node)
      # -----------------------------------------------------------------------
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["one61"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: postgres
                topologyKey: kubernetes.io/hostname

      imagePullSecrets:
        - name: gitea-registry

      containers:
        - name: hydroflow-antigravity
          image: 192.168.100.206/ivemcfire/hydroflow-antigravity:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          # -----------------------------------------------------------------
          # Environment — build DATABASE_URL from postgres-secret keys
          # k8s $(VAR) substitution assembles the connection string at runtime
          # -----------------------------------------------------------------
          env:
            - name: FASTIFY_PORT
              value: "3001"

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.hydroflow.svc.cluster.local:5432/$(POSTGRES_DB)"

          # -----------------------------------------------------------------
          # Resources — tuned for arm64 phone workers
          # -----------------------------------------------------------------
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi

          # -----------------------------------------------------------------
          # Probes — /health hits the DB and returns ok/error
          # -----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5

          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]

      terminationGracePeriodSeconds: 30
